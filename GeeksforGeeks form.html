<!DOCTYPE html>
<html lang="en">
<head>

    <title>Basic Form design using HTML</title>
</head>
<body>
    <h1><u>GeeksForGeeks</u></h1>
    <h3><u>Bsic form design using HTML</u></h3>
    <fieldset>
       <legend><u>personal Details</u></legend><br>
        <label>First Name :</label> <input type="text" required> <br>
        <br>
        <label>Last Name :</label> <input type="text" required> <br>
        <br>
        Gender : <input type="radio" name="1" id=""> Male <input type="radio" name="1" id="1"> Female <br>
        <br>
        <label>Email :</label> <input type="email" required><br>
        <br>
        <label>Date of Birth :</label><input type="date" required><br>
        <br>
        <label>Address :</label><br>
        <input type="text" required>
        <br><br>

        <button>Submit</button>
    </fieldset>
</body>
</html>
